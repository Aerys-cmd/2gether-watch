name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      playwright: ${{ steps.filter.outputs.playwright }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Playwright-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            playwright:
              - '2gether-watch/**'
              - 'frontend-tests/**'
              - '2gether-watch.sln'
              - 'global.json'
              - '.github/workflows/ci.yml'

  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore 2gether-watch.sln

      - name: Build
        run: dotnet build 2gether-watch.sln --no-restore --configuration Release

      - name: Test backend
        run: dotnet test 2gether-watch.sln --no-build --configuration Release --verbosity normal

  playwright-e2e:
    needs: changes
    if: needs.changes.outputs.playwright == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-tests/package-lock.json

      - name: Install frontend test dependencies
        working-directory: frontend-tests
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend-tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend-tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend-tests/playwright-report
            frontend-tests/test-results
          if-no-files-found: ignore
