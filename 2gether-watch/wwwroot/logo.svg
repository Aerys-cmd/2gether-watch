<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96" role="img" aria-label="2gWatch logo">
  <defs>
    <style>
      .logo-text {
        font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 44px;
        font-weight: 700;
        letter-spacing: -1px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="360" height="96" fill="#0f172a"/>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="359" height="95" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Film strip holes — left side -->
  <rect x="10" y="14" width="8" height="10" rx="1" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <rect x="10" y="30" width="8" height="10" rx="1" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <rect x="10" y="46" width="8" height="10" rx="1" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <rect x="10" y="62" width="8" height="10" rx="1" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <rect x="10" y="78" width="8" height="10" rx="1" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>

  <!-- Film strip holes — right side -->
  <rect x="342" y="14" width="8" height="10" rx="1" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <rect x="342" y="30" width="8" height="10" rx="1" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <rect x="342" y="46" width="8" height="10" rx="1" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <rect x="342" y="62" width="8" height="10" rx="1" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <rect x="342" y="78" width="8" height="10" rx="1" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>

  <!-- Vertical dividers separating film strip from content -->
  <line x1="26" y1="0" x2="26" y2="96" stroke="#334155" stroke-width="0.8"/>
  <line x1="334" y1="0" x2="334" y2="96" stroke="#334155" stroke-width="0.8"/>

  <!-- Inner content area background -->
  <rect x="27" y="1" width="306" height="94" fill="#0f172a"/>

  <!-- L-bracket — top left (inner area) -->
  <line x1="40" y1="12" x2="64" y2="12" stroke="#6366f1" stroke-width="2"/>
  <line x1="40" y1="12" x2="40" y2="36" stroke="#6366f1" stroke-width="2"/>

  <!-- L-bracket — top right (inner area) -->
  <line x1="320" y1="12" x2="296" y2="12" stroke="#6366f1" stroke-width="2"/>
  <line x1="320" y1="12" x2="320" y2="36" stroke="#6366f1" stroke-width="2"/>

  <!-- L-bracket — bottom left (inner area) -->
  <line x1="40" y1="84" x2="64" y2="84" stroke="#6366f1" stroke-width="2"/>
  <line x1="40" y1="84" x2="40" y2="60" stroke="#6366f1" stroke-width="2"/>

  <!-- L-bracket — bottom right (inner area) -->
  <line x1="320" y1="84" x2="296" y2="84" stroke="#6366f1" stroke-width="2"/>
  <line x1="320" y1="84" x2="320" y2="60" stroke="#6366f1" stroke-width="2"/>

  <!-- Logotype text -->
  <text x="180" y="64" class="logo-text" text-anchor="middle" dominant-baseline="auto">
    <tspan fill="#818cf8">2g</tspan><tspan fill="#ffffff">Watch</tspan>
  </text>
</svg>

