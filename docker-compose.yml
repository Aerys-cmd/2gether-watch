services:
  2gether-watch:
    image: ghcr.io/aerys-cmd/2gether-watch:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - FeedbackHub__PublicKey=${FEEDBACKHUB_PUBLIC_KEY:-}
      - GoogleAnalytics__MeasurementId=${GA_MEASUREMENT_ID:-}
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.2gether-watch.rule=Host(`2gether-watch.lunavex.com`)"
      - "traefik.http.routers.2gether-watch.entrypoints=websecure"
      - "traefik.http.routers.2gether-watch.tls=true"
      - "traefik.http.services.2gether-watch.loadbalancer.server.port=8080"

networks:
  web:
    external: true
